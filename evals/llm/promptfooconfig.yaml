description: FinFlow LLM Evaluation Suite

providers:
  - id: file://providers/finflow-transaction.ts
    label: openai-transaction
    config:
      provider: openai

  - id: file://providers/finflow-insights.ts
    label: openai-insights
    config:
      provider: openai

  - id: file://providers/finflow-chat.ts
    label: openai-chat
    config:
      provider: openai

scenarios:
  - description: Transaction parsing
    providers:
      - id: file://providers/finflow-transaction.ts
        label: openai-transaction
        config:
          provider: openai
    tests: datasets/transaction-parsing.yaml

  - description: Finance insights
    providers:
      - id: file://providers/finflow-insights.ts
        label: openai-insights
        config:
          provider: openai
    tests: datasets/finance-insights.yaml

  - description: Chat tool selection
    providers:
      - id: file://providers/finflow-chat.ts
        label: openai-chat
        config:
          provider: openai
    tests: datasets/chat-tool-selection.yaml

  - description: Guardrails adversarial
    providers:
      - id: file://providers/finflow-chat.ts
        label: openai-chat
        config:
          provider: openai
    tests: datasets/guardrails-adversarial.yaml

defaultTest:
  options:
    transformVars: "{ ...vars }"

outputPath: results/latest.json
