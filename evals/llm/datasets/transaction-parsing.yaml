- description: Basic expense in Spanish
  vars:
    input: "Gasté 50k en Uber ayer"
  assert:
    - type: is-json
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.amount === 50000 && data.type === 'expense';
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.confidence >= 0.7;

- description: Amount multiplier - k
  vars:
    input: "50k en uber"
  assert:
    - type: is-json
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.amount === 50000;

- description: Amount multiplier - mil
  vars:
    input: "Pagué 200 mil en el supermercado"
  assert:
    - type: is-json
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.amount === 200000;

- description: Amount multiplier - millones
  vars:
    input: "2 millones de salario"
  assert:
    - type: is-json
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.amount === 2000000 && data.type === 'income';

- description: Amount multiplier - palos
  vars:
    input: "Me llegaron 3 palos de salario"
  assert:
    - type: is-json
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.amount === 3000000 && data.type === 'income';

- description: Relative date - ayer (yesterday)
  vars:
    input: "Ayer gasté 30k en almuerzo"
  assert:
    - type: is-json
    - type: javascript
      value: |
        const data = JSON.parse(output);
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const expected = yesterday.toISOString().split('T')[0];
        return data.date === expected;

- description: Relative date - anteayer (day before yesterday)
  vars:
    input: "Anteayer pagué 15k en gasolina"
  assert:
    - type: is-json
    - type: javascript
      value: |
        const data = JSON.parse(output);
        const dby = new Date();
        dby.setDate(dby.getDate() - 2);
        const expected = dby.toISOString().split('T')[0];
        return data.date === expected;

- description: Debt payment detection
  vars:
    input: "Pagué 200k a mi tarjeta Chase"
  assert:
    - type: is-json
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.type === 'debt-payment' && data.liability_id !== null;

