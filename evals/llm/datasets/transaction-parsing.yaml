- description: Date format validation
  vars:
    input: "Compré zapatos por 150k"
  assert:
    - type: is-json
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return /^\d{4}-\d{2}-\d{2}$/.test(data.date);

