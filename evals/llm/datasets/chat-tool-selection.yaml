- description: Create expense transaction
  vars:
    input: "Add 30k expense for groceries"
  assert:
    - type: is-json
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.tool_calls && data.tool_calls.some(tc => tc.name === 'create_transaction');

