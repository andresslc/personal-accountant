- description: Get financial summary
  vars:
    input: "How much did I spend this month?"
  assert:
    - type: is-json
    - type: javascript
      value: |
        const data = JSON.parse(output);
        const validTools = ['get_financial_summary', 'get_transactions'];
        return data.tool_calls && data.tool_calls.some(tc => validTools.includes(tc.name)) || data.text.length > 20;

