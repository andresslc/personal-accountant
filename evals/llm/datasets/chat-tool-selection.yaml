- description: Route to debt agent
  vars:
    input: "What's the best strategy to pay off all my debts?"
  assert:
    - type: is-json
    - type: javascript
      value: |
        const data = JSON.parse(output);
        const hasRoute = data.tool_calls && data.tool_calls.some(tc => {
          if (tc.name === 'route_to_sub_agent') {
            const args = JSON.parse(tc.arguments);
            return args.agent === 'debt_agent';
          }
          return false;
        });
        return hasRoute || data.text.length > 50;

